# PIPELINE DEFINITION
# Name: my-pipeline
# Inputs:
#    a: float
#    b: float
# Outputs:
#    Output: str
components:
  comp-dataproc-create-pyspark-batch:
    executorLabel: exec-dataproc-create-pyspark-batch
    inputDefinitions:
      parameters:
        archive_uris:
          defaultValue: []
          description: 'HCFS URIs of archives to be extracted

            into the working directory of each executor. Supported file types:

            ``.jar``, ``.tar``, ``.tar.gz``, ``.tgz``, and ``.zip``.'
          isOptional: true
          parameterType: LIST
        args:
          defaultValue: []
          description: 'The arguments to pass to the driver. Do not

            include arguments that can be set as batch properties, such as

            ``--conf``, since a collision can occur that causes an incorrect batch

            submission.'
          isOptional: true
          parameterType: LIST
        batch_id:
          defaultValue: ''
          description: 'The ID to use for the batch, which will become

            the final component of the batch''s resource name. If none is

            specified, a default name will be generated by the component.  This

            value must be 4-63 characters. Valid characters are ``/[a-z][0-9]-/``.'
          isOptional: true
          parameterType: STRING
        container_image:
          defaultValue: ''
          description: 'Optional custom container image for the

            job runtime environment. If not specified, a default container image

            will be used.'
          isOptional: true
          parameterType: STRING
        file_uris:
          defaultValue: []
          description: 'HCFS URIs of files to be placed in the

            working directory of each executor.'
          isOptional: true
          parameterType: LIST
        jar_file_uris:
          defaultValue: []
          description: 'HCFS URIs of jar files to add to the

            classpath of the Spark driver and tasks.'
          isOptional: true
          parameterType: LIST
        kms_key:
          defaultValue: ''
          description: The Cloud KMS key to use for encryption.
          isOptional: true
          parameterType: STRING
        labels:
          defaultValue: {}
          description: "The labels to associate with this batch. Label\nkeys must\
            \ contain 1 to 63 characters, and must conform to RFC 1035.\nLabel values\
            \ may be empty, but, if present, must contain 1 to 63\ncharacters, and\
            \ must conform to RFC 1035. No more than 32 labels can\nbe associated\
            \ with a batch.  An object containing a list of ``\"key\":\nvalue`` pairs.\n\
            \  Example: ``{ \"name\": \"wrench\", \"mass\": \"1.3kg\", \"count\":\
            \ \"3\" }``."
          isOptional: true
          parameterType: STRUCT
        location:
          defaultValue: us-central1
          description: 'Location of the Dataproc batch workload. If

            not set, defaults to ``"us-central1"``.'
          isOptional: true
          parameterType: STRING
        main_python_file_uri:
          description: 'The HCFS URI of the main Python

            file to use as the Spark driver. Must be a ``.py`` file.'
          parameterType: STRING
        metastore_service:
          defaultValue: ''
          description: 'Resource name of an existing Dataproc

            Metastore service.'
          isOptional: true
          parameterType: STRING
        network_tags:
          defaultValue: []
          description: 'Tags used for network traffic

            control.'
          isOptional: true
          parameterType: LIST
        network_uri:
          defaultValue: ''
          description: Network URI to connect workload to.
          isOptional: true
          parameterType: STRING
        project:
          description: Project to run the Dataproc batch workload.
          parameterType: STRING
        python_file_uris:
          defaultValue: []
          description: 'HCFS file URIs of Python files to

            pass to the PySpark framework. Supported file types: ``.py``, ``.egg``,

            and ``.zip``.'
          isOptional: true
          parameterType: LIST
        runtime_config_properties:
          defaultValue: {}
          description: Runtime configuration for the workload.
          isOptional: true
          parameterType: STRUCT
        runtime_config_version:
          defaultValue: ''
          description: Version of the batch runtime.
          isOptional: true
          parameterType: STRING
        service_account:
          defaultValue: ''
          description: Service account that is used to execute the workload.
          isOptional: true
          parameterType: STRING
        spark_history_dataproc_cluster:
          defaultValue: ''
          description: 'The Spark History Server

            configuration for the workload.'
          isOptional: true
          parameterType: STRING
        split_output_path:
